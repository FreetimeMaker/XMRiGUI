name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare Windows requirements
        run: |
          # Entferne Linux-only Pakete aus requirements.txt
          findstr /V /C:"PyGObject" requirements.txt | findstr /V /C:"dbus-python" > req-win.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r req-win.txt

      - name: Build Windows executable
        run: |
          # Falls dein Makefile genutzt werden soll:
          make build-windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: XMRiGUI-Windows
          path: dist/
