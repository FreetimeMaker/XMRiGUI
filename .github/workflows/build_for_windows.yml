name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          make deps

      - name: Convert PNG icon to ICO
        shell: pwsh
        run: |
          python - << 'EOF'
          from PIL import Image
          img = Image.open("xmrigui.png")
          img.save("xmrigui.ico", format="ICO", sizes=[(256,256), (128,128), (64,64), (48,48), (32,32), (16,16)])
          EOF

      - name: Build Windows executable
        run: |
          make build-windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: XMRiGUI-Windows
          path: dist/
